name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: "Node ${{ matrix.node }} / Mongoose ${{ matrix.mongoose }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
        mongoose: ["7", "8", "9"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Mongoose ${{ matrix.mongoose }}
        run: npm install mongoose@${{ matrix.mongoose }} --save-dev

      - name: Run tests
        run: npm test
